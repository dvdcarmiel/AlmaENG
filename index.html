<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>English Adventure</title>
<style>
body{font-family:Arial,Helvetica,sans-serif;background:#eef3ff;margin:0;padding:16px}
.container{max-width:720px;margin:auto;text-align:center}
.card{background:white;border-radius:22px;padding:20px;margin:16px 0;box-shadow:0 10px 25px rgba(0,0,0,0.15)}
button{padding:14px;border:none;border-radius:14px;background:#4CAF50;color:white;font-size:18px;margin:6px;cursor:pointer;width:100%}
button.secondary{background:#2196F3}
button.small{width:auto;font-size:14px;padding:8px 12px}
.options button{background:#2196F3}
.word{font-size:44px;margin:10px 0;font-weight:bold}
.hint{font-size:18px;margin:10px 0;color:#333}
.hintHe{font-size:18px;margin:6px 0;color:#555;direction:rtl}
.speakBtn{font-size:16px;background:#ff9800;width:auto;padding:10px 14px}
.correct{background:#4CAF50 !important}
.wrong{background:#e53935 !important}
.score{font-size:20px;margin-top:6px}
.progress{font-size:14px;color:#666;margin-top:4px}
.level{font-size:18px;color:#444;margin-top:4px}
.path{display:flex;justify-content:center;align-items:center;gap:6px;margin-top:10px}
.node{width:18px;height:18px;border-radius:50%;background:#ccc}
.node.done{background:#4CAF50}
.character{font-size:26px}
.medal{font-size:26px;margin-top:10px}
</style>
</head>
<body>
<div class="container">
<h1>English Adventure 🚀</h1>
<p>Learn • Listen • Guess</p>

<div class="card" id="menu">
<h2>Choose Week</h2>
<button onclick="startWeek(1)">Week 1</button>
<button onclick="startWeek(2)">Week 2</button>
<button onclick="startWeek(3)">Week 3</button>
<button onclick="startWeek(4)">Week 4</button>
</div>

<div class="card" id="game" style="display:none">
<div class="level" id="level"></div>
<div class="path" id="path"></div>

<div class="word" id="word"></div>
<button class="speakBtn" onclick="speakCurrent()">🔊 Hear the word</button>

<div class="hint" id="hint"></div>
<div class="hintHe" id="hintHe"></div>
<button class="speakBtn" onclick="speakHint()">🔊 Hear the sentence</button>

<div class="options" id="options"></div>

<div class="score" id="score"></div>
<div class="progress" id="progress"></div>
<div class="medal" id="medal"></div>

<br>
<button class="secondary" onclick="nextWord()">Next</button>
<button class="small" onclick="backToMenu()">Menu</button>
</div>

</div>

<script>

const weeks={
1:[
{en:"dog",he:"כלב",hint:"The dog is running in the yard.",hintHe:"ה dog רץ בחצר."},
{en:"cat",he:"חתול",hint:"The cat is sleeping on the sofa.",hintHe:"ה cat ישן על הספה."},
{en:"house",he:"בית",hint:"This is my house.",hintHe:"זה ה house שלי."},
{en:"water",he:"מים",hint:"I drink water every day.",hintHe:"אני שותה water כל יום."},
{en:"food",he:"אוכל",hint:"The food smells very good.",hintHe:"ה food מריח מאוד טוב."},
{en:"mother",he:"אמא",hint:"My mother helps me with homework.",hintHe:"ה mother שלי עוזרת לי בשיעורים."},
{en:"father",he:"אבא",hint:"My father drives the car.",hintHe:"ה father שלי נוהג במכונית."},
{en:"brother",he:"אח",hint:"My brother plays football.",hintHe:"ה brother שלי משחק כדורגל."},
{en:"sister",he:"אחות",hint:"My sister likes music.",hintHe:"ה sister שלי אוהבת מוזיקה."},
{en:"friend",he:"חבר",hint:"My friend comes to play.",hintHe:"ה friend שלי בא לשחק."}
],
2:[
{en:"run",he:"לרוץ",hint:"I run in the park.",hintHe:"אני run בפארק."},
{en:"walk",he:"ללכת",hint:"We walk to school.",hintHe:"אנחנו walk לבית הספר."},
{en:"jump",he:"לקפוץ",hint:"The boy can jump high.",hintHe:"הילד יכול jump גבוה."},
{en:"sit",he:"לשבת",hint:"Please sit here.",hintHe:"בבקשה sit כאן."},
{en:"stand",he:"לעמוד",hint:"Stand near the door.",hintHe:"stand ליד הדלת."}
],
3:[
{en:"red",he:"אדום",hint:"The apple is red.",hintHe:"התפוח הוא red."},
{en:"blue",he:"כחול",hint:"The sky is blue.",hintHe:"השמיים הם blue."},
{en:"green",he:"ירוק",hint:"The grass is green.",hintHe:"הדשא הוא green."},
{en:"yellow",he:"צהוב",hint:"The sun looks yellow.",hintHe:"השמש נראית yellow."}
],
4:[
{en:"one",he:"אחד",hint:"I have one apple.",hintHe:"יש לי one תפוח."},
{en:"two",he:"שתיים",hint:"I see two birds.",hintHe:"אני רואה two ציפורים."},
{en:"three",he:"שלוש",hint:"There are three dogs.",hintHe:"יש three כלבים."}
]
};

let words=[];
let index=0;
let score=0;

function startWeek(w){
words=weeks[w];
index=0;
score=0;
show("game");
document.getElementById("level").innerText="Week "+w;
buildPath();
showWord();
updateScore();
}

function buildPath(){
const path=document.getElementById("path");
path.innerHTML="";
for(let i=0;i<words.length;i++){
let node=document.createElement("div");
node.className="node";
if(i<index) node.classList.add("done");
if(i===index){
let char=document.createElement("span");
char.className="character";
char.innerText="🧍";
path.appendChild(char);
}
path.appendChild(node);
}
}

function speak(text){
const utter=new SpeechSynthesisUtterance(text);
utter.lang="en-US";
speechSynthesis.speak(utter);
}

function speakCurrent(){
speak(words[index].en);
}

function speakHint(){
speak(words[index].hint);
}

function showWord(){
const w=words[index];

document.getElementById("word").innerText=w.en;
document.getElementById("hint").innerText=w.hint;
document.getElementById("hintHe").innerText=w.hintHe;

setTimeout(()=>speak(w.en),300);

let options=[w.he];
while(options.length<4){
let rand=words[Math.floor(Math.random()*words.length)].he;
if(!options.includes(rand)) options.push(rand);
}
options.sort(()=>Math.random()-0.5);

const container=document.getElementById("options");
container.innerHTML="";

options.forEach(opt=>{
let btn=document.createElement("button");
btn.innerText=opt;
btn.onclick=()=>selectAnswer(btn,opt===w.he);
container.appendChild(btn);
});

updateProgress();
}

function selectAnswer(btn,correct){
if(correct){
btn.classList.add("correct");
score++;
updateScore();
setTimeout(()=>{
nextWord();
},3000);
}else{
btn.classList.add("wrong");
}
}else{
btn.classList.add("wrong");
}
}

function nextWord(){
index++;
if(index>=words.length){
finishWeek();
return;
}
buildPath();
showWord();
}

function finishWeek(){
let medal="🥉";
if(score>7) medal="🥈";
if(score>9) medal="🥇";

document.getElementById("medal").innerText="You won: "+medal;
alert("🎉 Week Complete! Stars: "+score);
}

function updateProgress(){
document.getElementById("progress").innerText="Word "+(index+1)+" / "+words.length;
}

function updateScore(){
document.getElementById("score").innerText="⭐ Stars: "+score;
}

function show(id){
["menu","game"].forEach(x=>document.getElementById(x).style.display="none");
document.getElementById(id).style.display="block";
}

function backToMenu(){
show("menu");
document.getElementById("medal").innerText="";
}

</script>
</body>
</html>
